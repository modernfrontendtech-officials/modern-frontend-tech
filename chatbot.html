<body>
  <div class="app">
    <div class="top">
      <div class="title">HTML AI Assistant</div>
      <div id="status">Ready</div>
      <button id="clearBtn" type="button">Clear</button>
      <a href="index.html" class="home-link">Home</a>
    </div>

    <div id="messages"></div>

    <div class="composer">
      <input id="userInput" type="text" placeholder="Ask anything about HTML..." />
      <button id="sendBtn" type="button">Send</button>
    </div>

  <script>
    const messages = document.getElementById("messages");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");

    const history = [];

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function appendMessage(text, role) {
      const bubble = document.createElement("div");
      bubble.className = `msg ${role}`;
      bubble.textContent = text;
      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
    }

    async function askServer(message) {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Failed to get response.");
      }

      return data.reply;
    }

    async function handleSend() {
      const message = userInput.value.trim();
      if (!message) return;

      appendMessage(message, "user");
      history.push({ role: "user", content: message });
      userInput.value = "";
      sendBtn.disabled = true;
      setStatus("Thinking...");

      try {
        const reply = await askServer(message);
        appendMessage(reply, "bot");
        history.push({ role: "assistant", content: reply });
        setStatus("Ready");
      } catch (err) {
        appendMessage(err.message, "system");
        setStatus("Error");
      } finally {
        sendBtn.disabled = false;
      }
    }

    function clearChat() {
      history.length = 0;
      messages.innerHTML = "";
      appendMessage("Chat cleared. Ask any HTML question.", "bot");
    }

    sendBtn.addEventListener("click", handleSend);
    clearBtn.addEventListener("click", clearChat);
    userInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") handleSend();
    });

    appendMessage("Ask anything about HTML. I will answer using the AI model.", "bot");
  </script>
</body>
