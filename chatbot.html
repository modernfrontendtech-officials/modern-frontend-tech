<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chatbot</title>
     <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
body {
  font-family: 'Segoe UI', sans-serif;
}

#chat-icon {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(135deg,#6366f1,#3b82f6);
  color: white;
  padding: 16px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  z-index: 1000;
  transition: 0.3s;
}

#chat-icon:hover {
  transform: scale(1.1);
}

#chatbox {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 380px;
  height: 520px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.85);
  border-radius: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 1000;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

#chat-header {
  background: linear-gradient(135deg,#6366f1,#3b82f6);
  color: white;
  padding: 14px;
  font-weight: bold;
  text-align: center;
}

#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  font-size: 14px;
}

.message {
  margin: 8px 0;
  padding: 10px 14px;
  border-radius: 15px;
  max-width: 80%;
  line-height: 1.5;
}

.user-msg {
  background: #3b82f6;
  color: white;
  margin-left: auto;
}

.bot-msg {
  background: #f3f4f6;
  color: black;
}

.code-block {
  background: #111827;
  color: #10b981;
  padding: 10px;
  border-radius: 10px;
  font-family: monospace;
  font-size: 13px;
  margin-top: 6px;
  position: relative;
}

.copy-btn {
  position: absolute;
  top: 5px;
  right: 8px;
  background: #374151;
  color: white;
  border: none;
  padding: 3px 6px;
  font-size: 11px;
  cursor: pointer;
  border-radius: 6px;
}

#input-area {
  display: flex;
  border-top: 1px solid #ddd;
}

#userInput {
  flex: 1;
  border: none;
  padding: 12px;
  outline: none;
}

#sendBtn {
  border: none;
  padding: 12px 16px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.typing {
  font-style: italic;
  opacity: 0.7;
}
</style>
</head>
<body>
    <div id="chat-icon" onclick="openchat()">💬</div>
    <div id="chatbox">
        <div id="chat-header">your html helper</div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Type your message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
